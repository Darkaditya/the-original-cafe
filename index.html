<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Original — Premium Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#c9a84c;
  --gold-light:#e8c97a;
  --dark:#0d0d0d;
  --dark2:#141414;
  --dark3:#1c1c1c;
  --cream:#f5efe6;
  --cream2:#ede3d4;
  --text:#e8ddd0;
  --muted:#9e9080;
  --accent:#8b1a1a;
  --green:#2d6a4f;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--text);font-family:'Raleway',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.35;}
#statusBanner{position:fixed;top:0;left:0;right:0;z-index:999;text-align:center;padding:8px;font-family:'Raleway',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:500;transition:all .5s;}
#statusBanner.open{background:var(--green);color:#fff;}
#statusBanner.closed{background:var(--accent);color:#fff;}
header{text-align:center;padding:80px 20px 40px;position:relative;border-bottom:1px solid rgba(201,168,76,.2);}
header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120px;height:1px;background:var(--gold);}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.logo-ornament{color:var(--gold);font-size:22px;letter-spacing:8px;opacity:.7;}
.shop-name{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,8vw,72px);font-weight:300;letter-spacing:6px;color:var(--cream);text-transform:uppercase;line-height:1;}
.tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(14px,3vw,18px);color:var(--gold);letter-spacing:3px;margin-top:8px;opacity:.85;}
.divider-ornament{display:flex;align-items:center;gap:14px;margin:20px auto;width:fit-content;}
.divider-ornament span{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.divider-ornament span:last-child{background:linear-gradient(90deg,var(--gold),transparent);}
.divider-ornament i{color:var(--gold);font-size:14px;}
.pureveg-badge{display:inline-flex;align-items:center;gap:8px;border:1.5px solid #2e7d32;border-radius:4px;padding:5px 12px 5px 8px;margin-top:10px;background:rgba(46,125,50,.08);}
.veg-symbol{width:18px;height:18px;border:2px solid #2e7d32;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.veg-symbol::after{content:'';width:8px;height:8px;border-radius:50%;background:#2e7d32;}
.pureveg-text{font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-weight:600;color:#4caf50;}
.card-veg-icon{position:absolute;top:8px;left:8px;width:20px;height:20px;border:2px solid #2e7d32;border-radius:3px;background:rgba(13,13,13,.75);display:flex;align-items:center;justify-content:center;z-index:2;backdrop-filter:blur(2px);}
.card-veg-icon::after{content:'';width:9px;height:9px;border-radius:50%;background:#2e7d32;}
#cartBtn{position:fixed;bottom:24px;right:20px;z-index:900;background:var(--gold);color:var(--dark);border:none;border-radius:50%;width:58px;height:58px;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.4);font-size:22px;display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s;}
#cartBtn:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(201,168,76,.55);}
#cartCount{position:absolute;top:-5px;right:-5px;background:var(--accent);color:#fff;border-radius:50%;width:22px;height:22px;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;display:none;}
.cat-tabs{display:flex;overflow-x:auto;gap:8px;padding:24px 16px 16px;scrollbar-width:none;border-bottom:1px solid rgba(201,168,76,.12);position:sticky;top:29px;z-index:800;background:var(--dark);}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;padding:9px 18px;border:1px solid rgba(201,168,76,.3);border-radius:2px;background:transparent;color:var(--muted);font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:all .25s;white-space:nowrap;}
.cat-tab:hover{border-color:var(--gold);color:var(--gold);}
.cat-tab.active{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:600;}
.menu-section{padding:40px 16px 20px;max-width:960px;margin:0 auto;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,5vw,36px);font-weight:400;letter-spacing:4px;text-transform:uppercase;color:var(--cream2);margin-bottom:6px;}
.section-line{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.section-line::before,.section-line::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.4),transparent);}
.section-line::after{background:linear-gradient(90deg,transparent,rgba(201,168,76,.4));}
.section-line-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.item-card{background:var(--dark2);border:1px solid rgba(201,168,76,.12);border-radius:4px;overflow:hidden;transition:border-color .3s,transform .3s,box-shadow .3s;animation:fadeUp .5s ease both;}
.item-card:hover{border-color:rgba(201,168,76,.45);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.5);}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.item-img-wrap{position:relative;height:170px;overflow:hidden;background:var(--dark3);}
.item-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .5s;filter:brightness(.88) saturate(.9);}
.item-card:hover .item-img-wrap img{transform:scale(1.06);filter:brightness(1) saturate(1);}
.img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,13,.65) 0%,transparent 55%);}
.item-body{padding:14px 14px 12px;}
.item-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--cream);letter-spacing:.5px;line-height:1.2;margin-bottom:6px;}
.item-footer{display:flex;align-items:center;justify-content:space-between;}
.item-price{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold);letter-spacing:1px;}
.item-price::before{content:'₹';font-size:14px;vertical-align:super;margin-right:1px;}
.qty-control{display:flex;align-items:center;gap:0;}
.qty-btn{width:30px;height:30px;border:1px solid rgba(201,168,76,.5);background:transparent;color:var(--gold);font-size:18px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.qty-btn:hover{background:rgba(201,168,76,.15);}
.qty-btn.add-btn{border-radius:0 2px 2px 0;}
.qty-btn.rem-btn{border-radius:2px 0 0 2px;}
.qty-num{min-width:30px;height:30px;border-top:1px solid rgba(201,168,76,.5);border-bottom:1px solid rgba(201,168,76,.5);background:rgba(201,168,76,.06);color:var(--cream);font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;}
#cartDrawer{position:fixed;inset:0;z-index:2000;display:none;}
#cartBackdrop{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);}
#cartPanel{position:absolute;right:0;top:0;bottom:0;width:min(420px,100vw);background:var(--dark2);border-left:1px solid rgba(201,168,76,.2);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);overflow:hidden;}
#cartDrawer.open #cartPanel{transform:translateX(0);}
#cartDrawer.open{display:block;}
.cart-header{padding:20px 20px 16px;border-bottom:1px solid rgba(201,168,76,.15);display:flex;justify-content:space-between;align-items:center;}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:24px;letter-spacing:3px;color:var(--cream);}
#closeCart{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;transition:color .2s;}
#closeCart:hover{color:var(--gold);}
.cart-items{flex:1;overflow-y:auto;padding:16px 20px;}
.cart-items::-webkit-scrollbar{width:3px;}
.cart-items::-webkit-scrollbar-track{background:var(--dark3);}
.cart-items::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}
.cart-item{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.cart-item-name{flex:1;font-size:14px;color:var(--cream);}
.cart-item-qty{color:var(--muted);font-size:12px;}
.cart-item-price{color:var(--gold);font-weight:600;font-size:14px;}
.cart-empty{text-align:center;padding:60px 20px;color:var(--muted);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:18px;}
.cart-footer{padding:16px 20px;border-top:1px solid rgba(201,168,76,.15);}
.cart-total{display:flex;justify-content:space-between;margin-bottom:16px;font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--cream);}
.cart-total span:last-child{color:var(--gold);font-weight:600;}
#orderBtn{width:100%;padding:14px;background:var(--gold);color:var(--dark);border:none;border-radius:2px;font-family:'Raleway',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .2s,box-shadow .2s;}
#orderBtn:hover{background:var(--gold-light);box-shadow:0 4px 20px rgba(201,168,76,.4);}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:3000;display:flex;align-items:center;justify-content:center;padding:16px;display:none;}
.modal-backdrop.active{display:flex;}
.modal{background:var(--dark2);border:1px solid rgba(201,168,76,.25);border-radius:4px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;animation:modalIn .3s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.modal-header{padding:22px 22px 16px;border-bottom:1px solid rgba(201,168,76,.12);font-family:'Cormorant Garamond',serif;font-size:22px;letter-spacing:3px;color:var(--cream);display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.modal-body{padding:20px 22px;}
.delivery-choice{display:flex;gap:10px;margin-bottom:22px;}
.choice-btn{flex:1;padding:12px;border:1px solid rgba(201,168,76,.3);background:transparent;color:var(--muted);border-radius:2px;font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.choice-btn.selected{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:600;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.form-input{width:100%;padding:11px 12px;background:var(--dark3);border:1px solid rgba(201,168,76,.2);border-radius:2px;color:var(--cream);font-family:'Raleway',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--muted);font-size:12px;}
#placeOrderBtn{width:100%;padding:14px;margin-top:10px;background:var(--gold);color:var(--dark);border:none;border-radius:2px;font-family:'Raleway',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:600;cursor:pointer;transition:background .2s;}
#placeOrderBtn:hover{background:var(--gold-light);}
#adminBtn{position:fixed;bottom:94px;right:20px;z-index:900;background:var(--dark3);color:var(--muted);border:1px solid rgba(201,168,76,.2);border-radius:50%;width:42px;height:42px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
#adminBtn:hover{border-color:var(--gold);color:var(--gold);}
.status-btns{display:flex;gap:10px;margin-top:10px;}
.status-btn{flex:1;padding:12px;border:1px solid rgba(201,168,76,.3);background:transparent;border-radius:2px;cursor:pointer;font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;}
.status-btn.open-btn{color:var(--green);border-color:var(--green);}
.status-btn.open-btn:hover,.status-btn.open-btn.sel{background:var(--green);color:#fff;}
.status-btn.close-btn{color:var(--accent);border-color:var(--accent);}
.status-btn.close-btn:hover,.status-btn.close-btn.sel{background:var(--accent);color:#fff;}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark3);border:1px solid rgba(201,168,76,.3);color:var(--cream);padding:10px 22px;border-radius:2px;font-size:13px;letter-spacing:1px;opacity:0;transition:all .3s;pointer-events:none;z-index:5000;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(max-width:480px){.items-grid{grid-template-columns:1fr 1fr;}.item-img-wrap{height:130px;}.item-name{font-size:15px;}}
@media(max-width:340px){.items-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="statusBanner" class="open">✦ SHOP IS OPEN — ORDER NOW ✦</div>

<header>
  <div class="logo-wrap">
    <div class="logo-ornament">✦ ✦ ✦</div>
    <div class="shop-name">The Original</div>
    <div class="tagline">Where Every Sip Tells a Story</div>
    <div class="pureveg-badge">
      <div class="veg-symbol"></div>
      <span class="pureveg-text">Pure Vegetarian</span>
    </div>
    <div class="divider-ornament"><span></span><i>◈</i><span></span></div>
  </div>
</header>

<div class="cat-tabs" id="catTabs"></div>
<div id="menuContent"></div>

<button id="cartBtn" onclick="openCart()">🛒<span id="cartCount">0</span></button>
<button id="adminBtn" title="Dashboard" onclick="openAdmin()">⚙</button>
<div id="toast"></div>

<div id="cartDrawer">
  <div id="cartBackdrop" onclick="closeCart()"></div>
  <div id="cartPanel">
    <div class="cart-header">
      <div class="cart-title">Your Order</div>
      <button id="closeCart" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total"><span>Total</span><span id="cartTotal">₹0</span></div>
      <button id="orderBtn" onclick="openOrderModal()">Proceed to Order</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="orderModal">
  <div class="modal">
    <div class="modal-header">Place Order<button class="modal-close" onclick="closeOrderModal()">✕</button></div>
    <div class="modal-body">
      <div class="delivery-choice">
        <button class="choice-btn selected" id="btnDelivery" onclick="selectMode('delivery')">🚚 Delivery</button>
        <button class="choice-btn" id="btnPickup" onclick="selectMode('pickup')">🏃 Pickup</button>
      </div>
      <div id="deliveryFields">
        <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="dName" placeholder="Your name"/></div>
        <div class="form-group"><label class="form-label">Mobile Number</label><input class="form-input" id="dPhone" type="tel" placeholder="+91 XXXXXXXXXX"/></div>
        <div class="form-group"><label class="form-label">Building Name</label><input class="form-input" id="dBuilding" placeholder="Building / Society Name"/></div>
        <div class="form-group"><label class="form-label">Flat / House No.</label><input class="form-input" id="dFlat" placeholder="Flat No. / House No."/></div>
        <div class="form-group"><label class="form-label">Landmark / Area</label><input class="form-input" id="dLandmark" placeholder="Nearby landmark or area"/></div>
        <div class="form-group"><label class="form-label">Additional Notes</label><input class="form-input" id="dNotes" placeholder="Any special instructions..."/></div>
      </div>
      <div id="pickupFields" style="display:none;">
        <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="pName" placeholder="Your name"/></div>
        <div class="form-group"><label class="form-label">Mobile Number</label><input class="form-input" id="pPhone" type="tel" placeholder="+91 XXXXXXXXXX"/></div>
      </div>
      <button id="placeOrderBtn" onclick="sendOrder()">Send Order on WhatsApp</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="adminModal">
  <div class="modal">
    <div class="modal-header">Dashboard<button class="modal-close" onclick="closeAdmin()">✕</button></div>
    <div class="modal-body" id="adminBody">
      <div class="form-group">
        <label class="form-label">Enter Access Code</label>
        <input class="form-input" id="adminCode" type="password" placeholder="Enter code..." onkeydown="if(event.key==='Enter')verifyAdmin()"/>
      </div>
      <button id="placeOrderBtn" style="margin-top:8px;" onclick="verifyAdmin()">Verify</button>
    </div>
  </div>
</div>

const cart={};
let deliveryMode='delivery';
let shopOpen=true;
const WHATSAPP_NO='918709189586';
const categories=[...new Set(menuData.map(i=>i.cat))];

function buildTabs(){
  const tabs=document.getElementById('catTabs');
  const all=document.createElement('button');
  all.className='cat-tab active';all.textContent='All';
  all.onclick=()=>filterCat('All',all);
  tabs.appendChild(all);
  categories.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-tab';btn.textContent=cat;
    btn.onclick=()=>filterCat(cat,btn);
    tabs.appendChild(btn);
  });
}

function buildMenu(filter='All'){
  const container=document.getElementById('menuContent');
  container.innerHTML='';
  const cats=filter==='All'?categories:[filter];
  cats.forEach(cat=>{
    const items=menuData.filter(i=>i.cat===cat);
    const sec=document.createElement('div');
    sec.className='menu-section';
    sec.innerHTML=`<div class="section-title">${cat}</div><div class="section-line"><div class="section-line-dot"></div></div><div class="items-grid" id="grid-${cat.replace(/\s/g,'_')}"></div>`;
    container.appendChild(sec);
    const grid=sec.querySelector('.items-grid');
    items.forEach((item,idx)=>{
      const key=item.name;
      const qty=cart[key]?cart[key].qty:0;
      const card=document.createElement('div');
      card.className='item-card';
      card.style.animationDelay=(idx*0.05)+'s';
      card.innerHTML=`
        <div class="item-img-wrap">
          <img src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=400&q=80'"/>
          <div class="img-overlay"></div>
          <div class="card-veg-icon" title="Pure Veg"></div>
        </div>
        <div class="item-body">
          <div class="item-name">${item.name}</div>
          <div class="item-footer">
            <div class="item-price">${item.price}</div>
            <div class="qty-control" id="qc-${key.replace(/\s/g,'_').replace(/[()]/g,'')}">
              ${qty===0?`<button class="qty-btn add-btn" style="border-radius:2px;width:80px;font-size:12px;letter-spacing:1.5px;" onclick="addItem('${key}',${item.price})">ADD +</button>`:`<button class="qty-btn rem-btn" onclick="changeQty('${key}',-1)">−</button><div class="qty-num">${qty}</div><button class="qty-btn add-btn" onclick="changeQty('${key}',1)">+</button>`}
            </div>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  });
}

function filterCat(cat,btn){
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildMenu(cat);
}

function addItem(name,price){cart[name]={name,price,qty:1};refreshCard(name);updateCartCount();showToast(`${name} added ✓`);}
function changeQty(name,delta){if(!cart[name])return;cart[name].qty+=delta;if(cart[name].qty<=0)delete cart[name];refreshCard(name);updateCartCount();}
function refreshCard(name){
  const id='qc-'+name.replace(/\s/g,'_').replace(/[()]/g,'');
  const el=document.getElementById(id);if(!el)return;
  const item=menuData.find(i=>i.name===name);
  const qty=cart[name]?cart[name].qty:0;
  if(qty===0){el.innerHTML=`<button class="qty-btn add-btn" style="border-radius:2px;width:80px;font-size:12px;letter-spacing:1.5px;" onclick="addItem('${name}',${item.price})">ADD +</button>`;}
  else{el.innerHTML=`<button class="qty-btn rem-btn" onclick="changeQty('${name}',-1)">−</button><div class="qty-num">${qty}</div><button class="qty-btn add-btn" onclick="changeQty('${name}',1)">+</button>`;}
}
function updateCartCount(){
  const total=Object.values(cart).reduce((s,i)=>s+i.qty,0);
  const badge=document.getElementById('cartCount');
  badge.textContent=total;badge.style.display=total>0?'flex':'none';
}
function openCart(){document.getElementById('cartDrawer').classList.add('open');renderCartItems();}
function closeCart(){document.getElementById('cartDrawer').classList.remove('open');}
function renderCartItems(){
  const container=document.getElementById('cartItems');
  const items=Object.values(cart);
  if(items.length===0){container.innerHTML='<div class="cart-empty">Your cart is empty.<br>Add something delightful ✦</div>';document.getElementById('cartTotal').textContent='₹0';return;}
  container.innerHTML=items.map(i=>`<div class="cart-item"><div class="cart-item-name">${i.name}<span class="cart-item-qty"> × ${i.qty}</span></div><div class="cart-item-price">₹${i.price*i.qty}</div></div>`).join('');
  document.getElementById('cartTotal').textContent='₹'+items.reduce((s,i)=>s+i.price*i.qty,0);
}
function openOrderModal(){if(Object.keys(cart).length===0){showToast('Cart is empty!');return;}closeCart();document.getElementById('orderModal').classList.add('active');}
function closeOrderModal(){document.getElementById('orderModal').classList.remove('active');}
function selectMode(mode){
  deliveryMode=mode;
  document.getElementById('btnDelivery').classList.toggle('selected',mode==='delivery');
  document.getElementById('btnPickup').classList.toggle('selected',mode==='pickup');
  document.getElementById('deliveryFields').style.display=mode==='delivery'?'block':'none';
  document.getElementById('pickupFields').style.display=mode==='pickup'?'block':'none';
}
function genOrderId(){const now=new Date();const pad=n=>String(n).padStart(2,'0');return `ORD-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;}
function sendOrder(){
  const orderId=genOrderId();
  let msg=`🛍️ *NEW ORDER — The Original*\n📋 *Order ID:* ${orderId}\n📅 *Date:* ${new Date().toLocaleString('en-IN')}\n\n`;
  if(deliveryMode==='delivery'){
    const name=document.getElementById('dName').value.trim();
    const phone=document.getElementById('dPhone').value.trim();
    const building=document.getElementById('dBuilding').value.trim();
    const flat=document.getElementById('dFlat').value.trim();
    const landmark=document.getElementById('dLandmark').value.trim();
    const notes=document.getElementById('dNotes').value.trim();
    if(!name||!phone||!building||!flat){showToast('Please fill all required fields');return;}
    msg+=`🚚 *Mode:* Delivery\n👤 *Name:* ${name}\n📞 *Mobile:* ${phone}\n🏢 *Building:* ${building}\n🚪 *Flat/House:* ${flat}\n`;
    if(landmark)msg+=`📍 *Landmark:* ${landmark}\n`;
    if(notes)msg+=`📝 *Notes:* ${notes}\n`;
  }else{
    const name=document.getElementById('pName').value.trim();
    const phone=document.getElementById('pPhone').value.trim();
    if(!name||!phone){showToast('Please fill name and mobile');return;}
    msg+=`🏃 *Mode:* Pickup\n👤 *Name:* ${name}\n📞 *Mobile:* ${phone}\n`;
  }
  msg+=`\n🛒 *Items Ordered:*\n`;
  let total=0;
  Object.values(cart).forEach(i=>{msg+=`  • ${i.name} × ${i.qty} = ₹${i.price*i.qty}\n`;total+=i.price*i.qty;});
  msg+=`\n💰 *Total: ₹${total}*\n\nThank you for ordering from The Original! 🙏`;
  window.open(`https://wa.me/${WHATSAPP_NO}?text=${encodeURIComponent(msg)}`,'_blank');
  closeOrderModal();Object.keys(cart).forEach(k=>delete cart[k]);updateCartCount();buildMenu();
  showToast('Order sent via WhatsApp ✓');
}
function openAdmin(){
  document.getElementById('adminModal').classList.add('active');
  document.getElementById('adminBody').innerHTML=`<div class="form-group"><label class="form-label">Enter Access Code</label><input class="form-input" id="adminCode" type="password" placeholder="Enter code..." onkeydown="if(event.key==='Enter')verifyAdmin()"/></div><button style="margin-top:8px;width:100%;padding:14px;background:var(--gold);color:var(--dark);border:none;border-radius:2px;font-family:'Raleway',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:600;cursor:pointer;" onclick="verifyAdmin()">Verify</button>`;
}
function closeAdmin(){document.getElementById('adminModal').classList.remove('active');}
function verifyAdmin(){const code=document.getElementById('adminCode').value;if(code==='Aditya')showStatusControls();else showToast('Incorrect code ✗');}
function showStatusControls(){
  document.getElementById('adminBody').innerHTML=`<p style="color:var(--muted);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;">Select Shop Status</p><div class="status-btns"><button class="status-btn open-btn ${shopOpen?'sel':''}" onclick="setStatus(true)">✓ Open</button><button class="status-btn close-btn ${!shopOpen?'sel':''}" onclick="setStatus(false)">✕ Closed</button></div><button style="margin-top:20px;width:100%;padding:12px;background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--muted);border-radius:2px;cursor:pointer;letter-spacing:2px;font-size:11px;text-transform:uppercase;" onclick="closeAdmin()">Done</button>`;
}
function setStatus(open){
  shopOpen=open;
  const banner=document.getElementById('statusBanner');
  banner.className=open?'open':'closed';
  banner.textContent=open?'✦ SHOP IS OPEN — ORDER NOW ✦':'✦ SHOP IS CURRENTLY CLOSED — CHECK BACK SOON ✦';
  showStatusControls();showToast(open?'Shop marked as OPEN ✓':'Shop marked as CLOSED ✗');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

buildTabs();
buildMenu();
</script>
