<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Original — Premium Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#c9a84c;--gold-light:#e8c97a;--dark:#0d0d0d;--dark2:#141414;
  --dark3:#1c1c1c;--cream:#f5efe6;--cream2:#ede3d4;--text:#e8ddd0;
  --muted:#9e9080;--accent:#8b1a1a;--green:#2d6a4f;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--text);font-family:'Raleway',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.35;}

/* ── STATUS BANNER ── */
#statusBanner{position:fixed;top:0;left:0;right:0;z-index:999;text-align:center;padding:8px;font-family:'Raleway',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:500;transition:all .5s;}
#statusBanner.open{background:var(--green);color:#fff;}
#statusBanner.closed{background:var(--accent);color:#fff;}

/* ── AD CAROUSEL ── */
#adCarousel{overflow:hidden;background:var(--dark2);border-bottom:1px solid rgba(201,168,76,.15);display:none;}
.ad-slide{display:none;position:relative;cursor:pointer;}
.ad-slide.active{display:block;animation:adFadeIn .5s ease;}
@keyframes adFadeIn{from{opacity:0;}to{opacity:1;}}
.ad-slide img{width:100%;height:150px;object-fit:cover;filter:brightness(.75);}
.ad-slide-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(13,13,13,.75),transparent);display:flex;flex-direction:column;justify-content:center;padding:24px;}
.ad-slide-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream);letter-spacing:2px;margin-bottom:6px;}
.ad-slide-sub{font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.ad-dots{display:flex;justify-content:center;gap:6px;padding:8px 0;background:var(--dark2);}
.ad-dot{width:6px;height:6px;border-radius:50%;background:rgba(201,168,76,.25);cursor:pointer;transition:.3s;}
.ad-dot.active{background:var(--gold);width:18px;border-radius:3px;}

/* ── HEADER ── */
header{text-align:center;padding:80px 20px 40px;position:relative;border-bottom:1px solid rgba(201,168,76,.2);overflow:hidden;}
header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:120px;height:1px;background:var(--gold);}
#particleCanvas{position:absolute;inset:0;pointer-events:none;opacity:.4;}
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1;}
.logo-ornament{font-size:22px;letter-spacing:8px;display:flex;gap:10px;align-items:center;justify-content:center;}
.orn-dot{display:inline-block;animation:dotFloat 3s ease-in-out infinite;}
.d1{color:#c9a84c;animation-delay:0s;animation-name:dotFloat,dotColor1;}
.d2{color:#e8a0b0;animation-delay:.4s;animation-name:dotFloat,dotColor2;}
.d3{color:#7ec8c8;animation-delay:.8s;animation-name:dotFloat,dotColor3;}
@keyframes dotFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
@keyframes dotColor1{0%,100%{color:#c9a84c;}33%{color:#e8c97a;}66%{color:#a07a30;}}
@keyframes dotColor2{0%,100%{color:#e891a4;}33%{color:#f5b8c8;}66%{color:#c9607a;}}
@keyframes dotColor3{0%,100%{color:#5ec4c4;}33%{color:#8cdede;}66%{color:#3a9898;}}
.d1,.d2,.d3{animation-duration:3s,4s;animation-timing-function:ease-in-out,ease-in-out;animation-iteration-count:infinite,infinite;}
.shop-name{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,8vw,72px);font-weight:300;letter-spacing:6px;text-transform:uppercase;line-height:1;background:linear-gradient(90deg,var(--cream) 0%,var(--gold-light) 30%,var(--cream) 50%,var(--gold) 70%,var(--cream) 100%);background-size:250% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 5s linear infinite;}
@keyframes shimmer{0%{background-position:-250% center;}100%{background-position:250% center;}}
.tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(14px,3vw,18px);color:var(--gold);letter-spacing:3px;margin-top:8px;opacity:.85;}
.address-chip{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(201,168,76,.1),rgba(201,168,76,.04));border:1px solid rgba(201,168,76,.4);border-radius:24px;padding:8px 18px;margin-top:14px;font-size:11px;color:var(--cream);letter-spacing:1.5px;box-shadow:0 0 18px rgba(201,168,76,.15),inset 0 1px 0 rgba(201,168,76,.2);animation:addressGlow 3s ease-in-out infinite;}
@keyframes addressGlow{0%,100%{box-shadow:0 0 14px rgba(201,168,76,.15),inset 0 1px 0 rgba(201,168,76,.2);}50%{box-shadow:0 0 28px rgba(201,168,76,.35),inset 0 1px 0 rgba(201,168,76,.3);}}
.address-chip .pin{color:var(--gold);font-size:13px;}
.address-chip strong{color:var(--gold-light);font-weight:600;}
.divider-ornament{display:flex;align-items:center;gap:14px;margin:16px auto 0;width:fit-content;}
.divider-ornament span{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.divider-ornament span:last-child{background:linear-gradient(90deg,var(--gold),transparent);}
.divider-ornament i{color:var(--gold);font-size:14px;}
.pureveg-badge{display:inline-flex;align-items:center;gap:8px;border:1.5px solid #2e7d32;border-radius:4px;padding:5px 12px 5px 8px;margin-top:10px;background:rgba(46,125,50,.08);}
.veg-symbol{width:18px;height:18px;border:2px solid #2e7d32;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.veg-symbol::after{content:'';width:8px;height:8px;border-radius:50%;background:#2e7d32;}
.pureveg-text{font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-weight:600;color:#4caf50;}

/* Rest of your CSS remains same... */
.cat-tabs{display:flex;overflow-x:auto;gap:8px;padding:24px 16px 16px;scrollbar-width:none;border-bottom:1px solid rgba(201,168,76,.12);position:sticky;top:29px;z-index:800;background:var(--dark);}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;padding:9px 18px;border:1px solid rgba(201,168,76,.3);border-radius:2px;background:transparent;color:var(--muted);font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:all .25s;white-space:nowrap;position:relative;overflow:hidden;}
.cat-tab:hover{border-color:var(--gold);color:var(--gold);}
.cat-tab.active{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:600;}

.menu-section{padding:40px 16px 20px;max-width:960px;margin:0 auto;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,5vw,36px);font-weight:400;letter-spacing:4px;text-transform:uppercase;color:var(--cream2);margin-bottom:6px;}
.section-line{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.section-line::before,.section-line::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(201,168,76,.4),transparent);}
.section-line::after{background:linear-gradient(90deg,transparent,rgba(201,168,76,.4));}
.section-line-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}

.item-card{background:var(--dark2);border:1px solid rgba(201,168,76,.12);border-radius:4px;overflow:hidden;transition:border-color .3s,transform .3s,box-shadow .3s;opacity:0;transform:translateY(24px);}
.item-card.revealed{opacity:1;transform:translateY(0);transition:opacity .6s ease,transform .6s ease,border-color .3s,box-shadow .3s;}
.item-card:hover{border-color:rgba(201,168,76,.45);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.55);}
.item-img-wrap{position:relative;height:170px;overflow:hidden;background:var(--dark3);}
.item-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .55s;filter:brightness(.88) saturate(.9);}
.card-veg-icon{position:absolute;top:8px;left:8px;width:20px;height:20px;border:2px solid #2e7d32;border-radius:3px;background:rgba(13,13,13,.75);display:flex;align-items:center;justify-content:center;z-index:2;backdrop-filter:blur(2px);}
.card-veg-icon::after{content:'';width:9px;height:9px;border-radius:50%;background:#2e7d32;}
.sold-out-overlay{position:absolute;inset:0;background:rgba(13,13,13,.78);display:flex;align-items:center;justify-content:center;z-index:4;backdrop-filter:blur(2px);}
.sold-out-badge{background:var(--accent);color:#fff;font-family:'Raleway',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:600;padding:7px 18px;border-radius:2px;transform:rotate(-15deg);box-shadow:0 4px 16px rgba(139,26,26,.6);}
.item-body{padding:14px 14px 12px;}
.item-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;color:var(--cream);letter-spacing:.5px;line-height:1.2;margin-bottom:6px;}
.item-footer{display:flex;align-items:center;justify-content:space-between;}
.item-price{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--gold);letter-spacing:1px;}
.item-price::before{content:'₹';font-size:14px;vertical-align:super;margin-right:1px;}
.qty-control{display:flex;align-items:center;gap:0;}
.qty-btn{width:30px;height:30px;border:1px solid rgba(201,168,76,.5);background:transparent;color:var(--gold);font-size:18px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.qty-num{min-width:30px;height:30px;border-top:1px solid rgba(201,168,76,.5);border-bottom:1px solid rgba(201,168,76,.5);background:rgba(201,168,76,.06);color:var(--cream);font-size:14px;display:flex;align-items:center;justify-content:center;}
.add-initial-btn{border-radius:2px!important;width:80px!important;font-size:12px!important;letter-spacing:1.5px;}

#cartBtn{position:fixed;bottom:24px;right:20px;z-index:900;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;border:none;border-radius:50%;width:62px;height:62px;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;}
#cartCount{position:absolute;top:-6px;right:-6px;background:var(--accent);color:#fff;border-radius:50%;width:24px;height:24px;font-size:11px;display:none;align-items:center;justify-content:center;border:2px solid var(--dark);}

#chatBtn{position:fixed;bottom:24px;left:20px;z-index:900;background:var(--dark3);color:var(--gold);border:1px solid rgba(201,168,76,.35);border-radius:50%;width:58px;height:58px;cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;}
#chatPanel{position:fixed;bottom:96px;left:20px;width:min(360px,calc(100vw - 40px));height:min(520px,calc(100vh - 160px));background:var(--dark2);border:1px solid rgba(201,168,76,.25);border-radius:16px;z-index:901;display:none;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.7);overflow:hidden;}
#chatPanel.open{display:flex;}
.chat-header{padding:14px 16px;background:rgba(201,168,76,.1);border-bottom:1px solid rgba(201,168,76,.15);display:flex;align-items:center;gap:10px;}
.chat-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:#0a0a0a;}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.chat-msg{padding:10px 13px;font-size:13px;border-radius:12px;max-width:85%;}
.chat-msg.bot{background:rgba(201,168,76,.09);color:var(--cream);align-self:flex-start;}
.chat-msg.user{background:rgba(201,168,76,.22);color:var(--cream);align-self:flex-end;}
.chat-input-wrap{padding:10px 12px;border-top:1px solid rgba(201,168,76,.12);display:flex;gap:8px;}
.chat-input{flex:1;background:var(--dark3);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:9px 14px;color:var(--cream);outline:none;}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--gold);color:var(--dark);border:none;cursor:pointer;}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:3000;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-backdrop.active{display:flex;}
.modal{background:var(--dark2);border:1px solid rgba(201,168,76,.25);border-radius:6px;width:100%;max-width:480px;padding:20px;}
.btn-gold{width:100%;padding:14px;background:var(--gold);color:var(--dark);border:none;border-radius:2px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:2px;margin-top:10px;}
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--dark3);border:1px solid var(--gold);color:var(--cream);padding:10px 22px;border-radius:2px;opacity:0;transition:all .3s;z-index:5000;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="statusBanner" class="open">✦ SHOP IS OPEN — ORDER NOW ✦</div>

<header>
  <div class="logo-wrap">
    <div class="logo-ornament"><span class="orn-dot d1">✦</span> <span class="orn-dot d2">✦</span> <span class="orn-dot d3">✦</span></div>
    <div class="shop-name">The Original</div>
    <div class="tagline">Where Every Sip Tells a Story</div>
    <div class="address-chip">📍 <strong>S Type Adityapur</strong>, Near Vishal Megamart &nbsp;·&nbsp; 831013</div>
    <div class="pureveg-badge"><div class="veg-symbol"></div><span class="pureveg-text">Pure Vegetarian</span></div>
  </div>
</header>

<div class="cat-tabs" id="catTabs"></div>
<div id="menuContent"></div>

<button id="chatBtn" onclick="toggleChat()">💬</button>
<div id="chatPanel">
  <div class="chat-header">
    <div class="chat-avatar">TO</div>
    <div class="chat-header-info"><div class="chat-name">The Original Assistant</div></div>
    <button style="margin-left:auto;background:none;border:none;color:white;cursor:pointer" onclick="toggleChat()">✕</button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-wrap">
    <input class="chat-input" id="chatInput" placeholder="Kuch bhi poochhein..." onkeydown="if(event.key==='Enter')sendChat()"/>
    <button class="chat-send" id="chatSendBtn" onclick="sendChat()">➤</button>
  </div>
</div>

<button id="cartBtn" onclick="openOrderModal()">🛒<span id="cartCount">0</span></button>
<div id="toast"></div>

<div class="modal-backdrop" id="orderModal">
  <div class="modal">
    <h2 style="color:var(--gold);font-family:'Cormorant Garamond';margin-bottom:15px">Place Your Order</h2>
    <div id="orderItemsSummary" style="max-height:200px;overflow-y:auto;margin-bottom:15px;font-size:14px"></div>
    <input type="text" id="custName" placeholder="Aapka Naam" style="width:100%;padding:10px;margin-bottom:10px;background:#1c1c1c;border:1px solid #c9a84c;color:white">
    <input type="text" id="custAddr" placeholder="Aapka Pata (Address)" style="width:100%;padding:10px;margin-bottom:10px;background:#1c1c1c;border:1px solid #c9a84c;color:white">
    <button class="btn-gold" onclick="submitOrder()">WhatsApp Pe Order Karein</button>
    <button class="btn-gold" style="background:transparent;border:1px solid gray;color:gray" onclick="closeOrderModal()">Cancel</button>
  </div>
</div>

<script>
/* ══════════════════════════════════
   DATA & CONFIG
══════════════════════════════════ */
const menuData=[
  {cat:"Momos",name:"Classic Steam Momo",price:80,img:"https://i.ibb.co/68v8zM0/steam-momo.jpg"},
  {cat:"Momos",name:"Fried Momo",price:100,img:"https://i.ibb.co/68v8zM0/fried-momo.jpg"},
  {cat:"Coffee",name:"Classic Cold Coffee",price:80,img:"https://i.ibb.co/537Ss97/cold-cofee.jpg"},
  {cat:"Coffee",name:"Hazelnut Cold Coffee",price:100,img:"https://i.ibb.co/537Ss97/cold-cofee.jpg"},
  {cat:"Ice Cream",name:"Trio Ice Cream",price:70,img:"https://i.ibb.co/537Ss97/ice-cream.jpg"}
];

let cart={};

/* ══════════════════════════════════
   CORE FUNCTIONS
══════════════════════════════════ */
window.onload=()=>{
  renderTabs();
  renderMenu('All');
};

function renderTabs(){
  const cats=['All',...new Set(menuData.map(d=>d.cat))];
  document.getElementById('catTabs').innerHTML=cats.map(c=>
    `<button class="cat-tab ${c==='All'?'active':''}" onclick="renderMenu('${c}');setActiveTab(this)">${c}</button>`
  ).join('');
}

function setActiveTab(btn){
  document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function renderMenu(cat){
  const container=document.getElementById('menuContent');
  const items=cat==='All'?menuData:menuData.filter(d=>d.cat===cat);
  
  container.innerHTML=`
    <div class="menu-section">
      <div class="section-title">${cat}</div>
      <div class="section-line"><div class="section-line-dot"></div></div>
      <div class="items-grid">
        ${items.map(item=>`
          <div class="item-card revealed">
            <div class="item-img-wrap">
              <div class="card-veg-icon"></div>
              <img src="${item.img}" alt="${item.name}">
            </div>
            <div class="item-body">
              <div class="item-name">${item.name}</div>
              <div class="item-footer">
                <div class="item-price">${item.price}</div>
                <div class="qty-control">
                  ${cart[item.name]? `
                    <button class="qty-btn" onclick="updateCart('${item.name}',-1)">-</button>
                    <div class="qty-num">${cart[item.name].qty}</div>
                    <button class="qty-btn" onclick="updateCart('${item.name}',1)">+</button>
                  `: `
                    <button class="qty-btn add-initial-btn" onclick="updateCart('${item.name}',1)">ADD</button>
                  `}
                </div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function updateCart(name,delta){
  if(!cart[name]) {
    const item=menuData.find(d=>d.name===name);
    cart[name]={qty:0,price:item.price};
  }
  cart[name].qty+=delta;
  if(cart[name].qty<=0) delete cart[name];
  
  updateCartUI();
  const activeCat=document.querySelector('.cat-tab.active').textContent;
  renderMenu(activeCat);
}

function updateCartUI(){
  const count=Object.values(cart).reduce((a,b)=>a+b.qty,0);
  const badge=document.getElementById('cartCount');
  badge.textContent=count;
  badge.style.display=count>0?'flex':'none';
}

/* ══════════════════════════════════
   ORDER & WHATSAPP
══════════════════════════════════ */
function openOrderModal(){
  if(Object.keys(cart).length===0) return showToast("Pehle kuch add karein!");
  document.getElementById('orderModal').classList.add('active');
  let summary="";
  let total=0;
  for(let n in cart){
    summary+=`<p>${n} x ${cart[n].qty} = ₹${cart[n].qty*cart[n].price}</p>`;
    total+=cart[n].qty*cart[n].price;
  }
  summary+=`<hr style="margin:10px 0; border:0.5px solid #444"><p><b>Grand Total: ₹${total}</b></p>`;
  document.getElementById('orderItemsSummary').innerHTML=summary;
}

function closeOrderModal(){ document.getElementById('orderModal').classList.remove('active'); }

function submitOrder(){
  const name=document.getElementById('custName').value;
  const addr=document.getElementById('custAddr').value;
  if(!name || !addr) return alert("Naam aur Pata likhein!");

  let text=`*New Order from The Original*%0A%0A*Customer:* ${name}%0A*Address:* ${addr}%0A%0A*Items:*%0A`;
  let total=0;
  for(let n in cart){
    text+=`- ${n} (x${cart[name].qty})%0A`;
    total+=cart[n].qty*cart[n].price;
  }
  text+=`%0A*Total: ₹${total}*`;
  window.open(`https://wa.me/918709189586?text=${text}`, '_blank');
}

/* ══════════════════════════════════
   CHATBOT (FIXED MODEL NAME)
══════════════════════════════════ */
function toggleChat(){ document.getElementById('chatPanel').classList.toggle('open'); }

async function sendChat(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg) return;

  addChatMsg('user', msg);
  input.value='';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': 'YOUR_API_KEY', // <--- APNI API KEY YAHAN DALYEIN
        'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022', // <--- FIXED MODEL NAME
        max_tokens: 1024,
        messages: [{ role: 'user', content: msg }]
      })
    });
    
    if(res.ok){
      const data=await res.json();
      addChatMsg('bot', data.content[0].text);
    } else {
      addChatMsg('bot', "Kshama karein, API connection mein samasya hai. 🙏");
    }
  } catch(e) {
    addChatMsg('bot', "Network error! Kripya WhatsApp karein.");
  }
}

function addChatMsg(sender, text){
  const div=document.createElement('div');
  div.className=`chat-msg ${sender}`;
  div.textContent=text;
  document.getElementById('chatMessages').appendChild(div);
  document.getElementById('chatMessages').scrollTop=99999;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
</body>
</html>
