<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Original — Premium Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#c9a84c;--gold-light:#e8c97a;--dark:#0d0d0d;--dark2:#141414;
  --dark3:#1c1c1c;--cream:#f5efe6;--cream2:#ede3d4;--text:#e8ddd0;
  --muted:#9e9080;--accent:#8b1a1a;--green:#2d6a4f;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--dark);color:var(--text);font-family:'Raleway',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;}
/* ... (Baki saara CSS jo aapne bheja tha, yahan waisa hi rahega) ... */
</style>
</head>
<body>

<div id="statusBanner" class="open">✦ SHOP IS OPEN — ORDER NOW ✦</div>
<div id="adCarousel"><div id="adSlides"></div><div class="ad-dots" id="adDots"></div></div>

<header>
  <canvas id="particleCanvas"></canvas>
  <div class="logo-wrap">
    <div class="logo-ornament"><span class="orn-dot d1">✦</span> <span class="orn-dot d2">✦</span> <span class="orn-dot d3">✦</span></div>
    <div class="shop-name">The Original</div>
    <div class="tagline">Where Every Sip Tells a Story</div>
    <div class="address-chip">📍 <strong>S Type Adityapur</strong>, near Vishal Megamart &nbsp;·&nbsp; PIN <strong>831013</strong></div>
    <div class="pureveg-badge"><div class="veg-symbol"></div><span class="pureveg-text">Pure Vegetarian</span></div>
    <div class="divider-ornament"><span></span><i>◈</i><span></span></div>
  </div>
</header>

<div class="cat-tabs" id="catTabs"></div>
<div id="menuContent"></div>

<button id="cartBtn" onclick="openCart()">🛒<span id="cartCount">0</span></button>
<button id="adminBtn" onclick="openAdmin()">⚙</button>
<button id="chatBtn" onclick="toggleChat()">💬<div class="chat-pulse"></div></button>

<script>
/* ══════════════════════════════════
   DATA (YEHAN FIX KIYA GAYA HAI)
══════════════════════════════════ */
let menuData = [
  {id:1,cat:"Momos",name:"Classic Steam Momo",price:80,img:"https://i.ibb.co/68v8zM0/steam-momo.jpg",soldOut:false},
  {id:2,cat:"Momos",name:"Fried Momo",price:100,img:"https://i.ibb.co/68v8zM0/fried-momo.jpg",soldOut:false},
  {id:3,cat:"Momos",name:"Kurkure Paneer Momo",price:140,img:"https://i.ibb.co/68v8zM0/fried-momo.jpg",soldOut:false},
  {id:4,cat:"Momos",name:"Pan Fried Momo",price:140,img:"https://i.ibb.co/68v8zM0/fried-momo.jpg",soldOut:false},
  {id:5,cat:"Momos",name:"Gravy Momo",price:150,img:"https://i.ibb.co/68v8zM0/fried-momo.jpg",soldOut:false},
  
  // FIXED LINES BELOW: Added missing " and }
  {id:6,cat:"Coffee",name:"Classic Cold Coffee",price:80,img:"https://i.ibb.co/537Ss97/cold-cofee.jpg",soldOut:false},
  {id:7,cat:"Coffee",name:"Hazelnut Cold Coffee",price:100,img:"https://i.ibb.co/537Ss97/cold-cofee.jpg",soldOut:false},
  
  {id:8,cat:"Ice Cream",name:"Trio Ice Cream",price:70,img:"https://i.ibb.co/537Ss97/ice-cream.jpg",soldOut:false}
];

/* ══════════════════════════════════
   CORE LOGIC (Sahi render functions)
══════════════════════════════════ */
window.onload = () => {
  renderTabs();
  renderMenu("All");
  // Particle background initialize karne ke liye function yahan call karein
};

function renderTabs() {
  const cats = ["All", ...new Set(menuData.map(i => i.cat))];
  document.getElementById('catTabs').innerHTML = cats.map(c => 
    `<button class="cat-tab ${c==='All'?'active':''}" onclick="filterMenu('${c}', this)">${c}</button>`
  ).join('');
}

function filterMenu(cat, btn) {
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMenu(cat);
}

function renderMenu(cat) {
  const container = document.getElementById('menuContent');
  const items = cat === "All" ? menuData : menuData.filter(i => i.cat === cat);
  
  container.innerHTML = `
    <div class="menu-section">
      <div class="section-title">${cat}</div>
      <div class="section-line"><div class="section-line-dot"></div></div>
      <div class="items-grid">
        ${items.map(item => `
          <div class="item-card revealed">
            <div class="item-img-wrap">
              <div class="card-veg-icon"></div>
              ${item.soldOut ? '<div class="sold-out-overlay"><span class="sold-out-badge">Sold Out</span></div>' : ''}
              <img src="${item.img}" alt="${item.name}">
            </div>
            <div class="item-body">
              <div class="item-name">${item.name}</div>
              <div class="item-footer">
                <div class="item-price">${item.price}</div>
                <div class="qty-control">
                   <button class="qty-btn add-initial-btn" onclick="updateCart(${item.id}, 1)">ADD</button>
                </div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// Baki ke saare functions (updateCart, toggleChat, submitOrder) 
// wahi purane rakhein jo aapke paas hain.
</script>
</body>
</html>
